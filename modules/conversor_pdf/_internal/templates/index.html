<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CONVERSOR PDF PARA DWG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006AFF;
            --primary-light: #3d8bff;
            --primary-glow: rgba(0, 106, 255, 0.35);
            --bg: #0a0f1e;
            --bg-secondary: #111827;
            --card-bg: rgba(17, 24, 39, 0.85);
            --text: #f0f4f8;
            --text-muted: #8896ab;
            --border: rgba(55, 65, 81, 0.6);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.25);
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(0, 106, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 60, 180, 0.08) 0%, transparent 55%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 2rem;
            text-align: center;
        }

        header {
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .badge {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary-light);
            background: rgba(0, 106, 255, 0.1);
            border: 1px solid rgba(0, 106, 255, 0.2);
            border-radius: 20px;
        }

        .convert-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow:
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 2.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(10, 15, 30, 0.4);
        }

        .drop-zone:hover,
        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(0, 106, 255, 0.04);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .drop-zone .icon-upload {
            width: 44px;
            height: 44px;
            margin: 0 auto 0.75rem;
            color: var(--primary);
            opacity: 0.9;
        }

        .drop-zone p {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.35rem;
        }

        .drop-zone span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        #file-input {
            display: none;
        }

        .status-container {
            margin-top: 1.5rem;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(55, 65, 81, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            box-shadow: 0 0 12px var(--primary-glow);
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .status-text {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--primary-light);
            min-height: 1.2em;
        }

        /* Info card after conversion */
        .info-card {
            display: none;
            margin-top: 1.25rem;
            padding: 1rem 1.25rem;
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 12px;
            text-align: left;
        }

        .info-card .info-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--success);
            margin-bottom: 0.6rem;
        }

        .info-card .info-title svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem 1.5rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
        }

        .info-item .label {
            color: var(--text-muted);
        }

        .info-item .value {
            font-weight: 600;
            color: var(--text);
        }

        /* Buttons */
        .actions {
            display: none;
            gap: 0.75rem;
            flex-direction: column;
            margin-top: 1.25rem;
        }

        .btn-primary {
            padding: 0.85rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), #0052cc);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 20px -4px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -4px var(--primary-glow);
            filter: brightness(1.08);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            padding: 0.7rem 1.25rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-new {
            padding: 0.7rem 1.25rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px dashed var(--border);
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.25rem;
        }

        .btn-new:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: rgba(136, 150, 171, 0.5);
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px var(--primary-glow); }
            50% { box-shadow: 0 0 30px var(--primary-glow); }
        }

        .processing .drop-zone {
            animation: pulse-glow 2s infinite ease-in-out;
            pointer-events: none;
            opacity: 0.5;
            border-color: var(--primary);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slide-up 0.4s ease forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>CONVERSOR PDF PARA DWG</h1>
            <div class="badge">Detecção automática de escala</div>
        </header>

        <main class="convert-card" id="main-card">
            <div class="drop-zone" id="drop-zone">
                <svg class="icon-upload" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p id="drop-text">Arraste seu PDF aqui</p>
                <span>ou clique para selecionar</span>
                <input type="file" id="file-input" accept=".pdf">
            </div>

            <div class="status-container" id="status-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="status-text" id="status-text">Processando arquivo...</div>
            </div>

            <div class="info-card" id="info-card">
                <div class="info-title">
                    <svg fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                            clip-rule="evenodd"></path>
                    </svg>
                    Conversão concluída!
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Escala</span>
                        <span class="value" id="info-escala">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Elementos</span>
                        <span class="value" id="info-elementos">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Tamanho</span>
                        <span class="value" id="info-tamanho">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Formato</span>
                        <span class="value">.DWG</span>
                    </div>
                </div>
            </div>

            <div class="actions" id="actions">
                <button class="btn-primary" id="btn-save-as">Escolher Pasta e Salvar</button>
                <button class="btn-secondary" id="btn-download">Baixar para Downloads</button>
                <button class="btn-new" id="btn-new">Converter outro arquivo</button>
            </div>
        </main>

        <footer>
            Ferramenta feita por Valdeci Nunes
        </footer>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const mainCard = document.getElementById('main-card');
        const statusContainer = document.getElementById('status-container');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const actions = document.getElementById('actions');
        const btnSaveAs = document.getElementById('btn-save-as');
        const btnDownload = document.getElementById('btn-download');
        const btnNew = document.getElementById('btn-new');
        const dropText = document.getElementById('drop-text');
        const infoCard = document.getElementById('info-card');

        let currentFile = null;

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('active'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFiles(fileInput.files[0]);
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const file = dt.files[0];
            handleFiles(file);
        }

        function handleFiles(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('Por favor, selecione apenas arquivos PDF.');
                return;
            }

            dropText.textContent = file.name;
            startConversion(file);
        }

        function resetUI() {
            mainCard.classList.remove('processing');
            statusContainer.style.display = 'none';
            actions.style.display = 'none';
            infoCard.style.display = 'none';
            progressFill.style.width = '0%';
            statusText.style.color = '';
            dropText.textContent = 'Arraste seu PDF aqui';
            fileInput.value = '';
        }

        function startConversion(file) {
            mainCard.classList.add('processing');
            statusContainer.style.display = 'block';
            actions.style.display = 'none';
            infoCard.style.display = 'none';
            progressFill.style.width = '0%';
            statusText.textContent = 'Enviando arquivo...';
            statusText.style.color = '';

            const formData = new FormData();
            formData.append('file', file);

            let prog = 0;
            const interval = setInterval(() => {
                prog += 1.5;
                if (prog <= 90) progressFill.style.width = prog + '%';
                if (prog >= 10 && prog < 12) statusText.textContent = 'Detectando escala...';
                if (prog >= 30 && prog < 32) statusText.textContent = 'Convertendo vetores...';
                if (prog >= 55 && prog < 57) statusText.textContent = 'Processando cores e preenchimentos...';
                if (prog >= 75 && prog < 77) statusText.textContent = 'Gerando arquivo DWG...';
            }, 120);

            fetch('/convert', {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    clearInterval(interval);
                    if (!response.ok) return response.json().then(d => { throw new Error(d.message || 'Erro desconhecido') });
                    return response.json();
                })
                .then(data => {
                    progressFill.style.width = '100%';
                    statusText.textContent = '';
                    mainCard.classList.remove('processing');
                    
                    // Show info card
                    infoCard.style.display = 'block';
                    infoCard.classList.add('animate-in');
                    document.getElementById('info-escala').textContent = '1:' + data.escala_detectada;
                    document.getElementById('info-elementos').textContent = data.total_elementos.toLocaleString();
                    document.getElementById('info-tamanho').textContent = data.tamanho_kb + ' KB';

                    // Show actions
                    actions.style.display = 'flex';
                    actions.classList.add('animate-in');

                    btnSaveAs.onclick = () => {
                        statusContainer.style.display = 'block';
                        statusText.textContent = 'Aguardando diálogo de salvamento...';
                        statusText.style.color = '';
                        fetch('/save_as', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                file_id: data.file_id,
                                original_name: data.original_name
                            })
                        })
                            .then(res => res.json())
                            .then(saveRes => {
                                if (saveRes.status === 'success') {
                                    statusText.textContent = 'Salvo em: ' + saveRes.path;
                                    statusText.style.color = '#22c55e';
                                } else if (saveRes.status === 'cancelled') {
                                    statusText.textContent = 'Salvamento cancelado.';
                                    statusText.style.color = 'var(--text-muted)';
                                }
                            });
                    };

                    btnDownload.onclick = () => {
                        window.location.href = '/download/' + data.file_id;
                    };

                    btnNew.onclick = () => {
                        resetUI();
                    };
                })
                .catch(error => {
                    clearInterval(interval);
                    mainCard.classList.remove('processing');
                    statusText.textContent = error.message || 'Erro ao converter arquivo.';
                    statusText.style.color = '#ef4444';
                });
        }
    </script>
</body>

</html>
